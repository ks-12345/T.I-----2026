<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Análise de Sentimentos</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Sistema de Análise de Sentimentos</h1>

<div class="entrada">

<label>Digite seu comentário:</label>

<textarea placeholder="Digite seu texto aqui..."></textarea>

<button>Analisar Sentimento</button>

</div>

<div class="resultado">

<h2>Resultado</h2>

<p class="positivo">Comentário Positivo 😊</p>

<p class="negativo">Comentário Negativo 😡</p>

<p class="neutro">Comentário Neutro 😐</p>

</div>

</div>

</body>
</html>
